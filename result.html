<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; text-align: center; background:#f5f5f5;">

    <h1>📊 Prediction Result</h1>

    <h2>{{ result }}</h2>

    <h3>Risk Level: {{ risk }}%</h3>

    <canvas id="riskChart" width="400" height="200"></canvas>

    <!-- Reasons -->
    {% if reasons %}
        <h3>🔍 Why this result?</h3>
        <ul style="text-align:left; width:60%; margin:auto;">
            {% for reason in reasons %}
                <li>{{ reason }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <br><br>
    <a href="/" style="text-decoration:none;">
        <button style="padding:10px 20px; background:#007BFF; color:white; border:none; border-radius:8px;">
            🔙 Go Back
        </button>
    </a>

    <!-- Chart -->
    <script>
        const ctx = document.getElementById('riskChart').getContext('2d');
        const riskValue = {{ risk }};

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Risk Level'],
                datasets: [{
                    label: 'Risk %',
                    data: [riskValue],
                    backgroundColor: [
                        riskValue > 70 ? 'red' :
                        riskValue > 40 ? 'orange' : 'green'
                    ]
                }]
            },
            options: {
                animation: {
                    duration: 1500
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });
    </script>

</body>
</html>
