<!DOCTYPE html>
<html>
<head>
    <title>AI Job Scam Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .container {
        width: 90%;
        max-width: 900px;   /* full on laptop, limited width */
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        text-align: center;
    }

    textarea {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #007BFF;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        margin-top: 10px;
    }

    button:hover {
        background: #0056b3;
    }

    .result {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
    }

    ul {
        text-align: left;
        padding-left: 20px;
    }

    /* 📱 Mobile adjustments */
    @media (max-width: 600px) {
        .container {
            width: 95%;
            padding: 20px;
        }

        textarea {
            font-size: 14px;
        }

        .result {
            font-size: 18px;
        }
    }
</style>
</head>
<body style="font-family: Arial; text-align: center; background: #f5f5f5;">

    <div class="container">
    
<h1 style="color: #333;">🚀 AI Job Scam Detector</h1>

    <form method="POST">
        {% csrf_token %}
        <textarea name="job_text" rows="6" cols="60"
            placeholder="Paste job description here..."
            style="padding:10px; border-radius:10px;"></textarea><br><br>

        <button type="submit"
            style="padding:10px 20px; border:none; background:#007BFF; color:white; border-radius:8px;">
            Check
        </button>
    </form>

    {% if result %}
        <h2>{{ result }}</h2>
        {% if reasons %}
    <h3>🔍 Why this result?</h3>
    <ul style="text-align:left; width:60%; margin:auto;">
        {% for reason in reasons %}
            <li>{{ reason }}</li>
        {% endfor %}
    </ul>
{% endif %}
    {% endif %}

    {% if risk %}
    <!-- FLEX CONTAINER (SIDE BY SIDE) -->
    <div style="display:flex; justify-content:center; align-items:center; gap:40px; margin-top:30px;">

        <!-- LEFT: Risk Text + Progress Bar -->
        <div style="width:50%; text-align:left;">

            <h3>Risk Level: {{ risk }}%</h3>

            <div style="width:100%; background:#ddd; border-radius:10px;">
                <div style="width: {{ risk }}%;
                            background:
                            {% if risk > 70 %}#e96b6b
                            {% elif risk > 40 %}orange
                            {% else %}green
                            {% endif %};
                            color:white; padding:10px; border-radius:10px;">
                    {{ risk }}%
                </div>
            </div>

        </div>

        <!-- RIGHT: Chart -->
        <div style="width:250px; height:250px;">
            <canvas id="riskChart"></canvas>
        </div>

    </div>
    {% endif %}

    {% if risk %}
    <script>
        const ctx = document.getElementById('riskChart').getContext('2d');

        const riskValue = {{ risk }};

        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Risk Level'],
                datasets: [{
                    label: 'Risk %',
                    data: [riskValue],
                    backgroundColor: [
                        riskValue > 70 ? '#e96b6b' :
                        riskValue > 40 ? 'orange' : 'green'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 1500
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });
    </script>
    {% endif %}







</div>
   
</body>
</html>
